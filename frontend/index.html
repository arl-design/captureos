<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>CaptureOS</title>
    <link rel="preload" href="/fonts/PublicSans-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/PublicSans-Black.woff2" as="font" type="font/woff2" crossorigin />
    <script>
      // Set the window title before Chromium maps the surface so labwc
      // window rules can match booth vs gallery on first map.
      (function () {
        var h = location.hash || '';
        document.title = /gallery|slideshow/.test(h)
          ? 'CaptureOS Gallery'
          : /admin/.test(h)
            ? 'CaptureOS Admin'
            : 'CaptureOS Booth';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
