# CaptureOS nginx site.
# Serves the built frontend, photo files, and proxies /api to the backend.
# Install: copy to /etc/nginx/sites-available/captureos and symlink into
# sites-enabled (install.sh does this).

server {
    listen 80 default_server;
    server_name _;

    root /opt/captureos/frontend/dist;
    index index.html;

    # Frontend (hash-routed SPA — no fallback rewrites needed beyond /)
    location / {
        try_files $uri /index.html;
    }

    # Full-size photos and thumbnails straight off disk
    location /photos/ {
        alias /opt/captureos/data/photos/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /thumbnails/ {
        alias /opt/captureos/data/thumbnails/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin API: LAN-only (security requirement: "LAN-only administration").
    # The PIN/token auth still applies on top of this.
    location /api/admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:3000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API -> Express backend (strip the /api prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Long-lived streams: SSE (/api/events) and MJPEG (/api/preview)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
